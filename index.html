<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="vivire — tu diario personal diario" />
  <title>vivire</title>

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Auth Screen
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="auth-screen">
    <div class="auth-card">
      <span class="auth-logo">vivire</span>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-form="signin-form">Entrar</button>
        <button class="auth-tab"        data-form="signup-form">Crear cuenta</button>
      </div>

      <!-- Sign-in form -->
      <form class="auth-form active" id="signin-form" novalidate>
        <input type="email"    id="signin-email"    placeholder="Email"       autocomplete="email"         required />
        <input type="password" id="signin-password" placeholder="Contraseña"  autocomplete="current-password" required />
        <p class="auth-error" id="auth-error"></p>
        <button type="submit" class="auth-submit" id="signin-btn">Entrar</button>
      </form>

      <!-- Sign-up form -->
      <form class="auth-form" id="signup-form" novalidate>
        <input type="text"     id="signup-name"     placeholder="Tu nombre"   autocomplete="name"     required />
        <input type="email"    id="signup-email"    placeholder="Email"       autocomplete="email"    required />
        <input type="password" id="signup-password" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="new-password" required />
        <p class="auth-error" id="auth-error-signup"></p>
        <button type="submit" class="auth-submit" id="signup-btn">Crear cuenta</button>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       App Screen (built dynamically by app.js)
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="app-screen"></div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       Supabase config — replace values or inject via Vercel env substitution
  ════════════════════════════════════════════════════════════════════════════ -->
  <script>
    // For local development: replace these with your actual Supabase credentials.
    // For Vercel deployment: use a build-time script or edge middleware to inject
    // the real values, or replace these placeholders with Vercel env vars via
    // a custom _middleware or by using the Vercel CLI's `vercel env pull`.
    window.SUPABASE_URL      = 'REPLACE_WITH_SUPABASE_URL';
    window.SUPABASE_ANON_KEY = 'REPLACE_WITH_SUPABASE_ANON_KEY';
  </script>

  <!-- Supabase JS SDK (UMD build, no bundler required) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>
</body>
</html>
